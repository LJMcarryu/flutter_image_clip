name: flutter_image_clip
description: A reusable Android and iOS Flutter image clipping library with a ready-to-use crop editor UI and image processing APIs.
version: 0.7.1
repository: https://github.com/LJMcarryu/flutter_image_clip

topics:
  - image
  - crop
  - clipping
  - editor

platforms:
  android:
  ios:

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.8.0

dev_dependencies:
  analyzer: ^8.4.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ljmcarryu.flutter_image_clip
        pluginClass: FlutterImageClipPlugin
      ios:
        pluginClass: FlutterImageClipPlugin
  uses-material-design: true
