name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter checks (${{ matrix.flutter-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter-version:
          - '3.38.1'
          - stable
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up minimum Flutter
        if: matrix.flutter-version != 'stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Set up stable Flutter
        if: matrix.flutter-version == 'stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test benchmark tool

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Check public API snapshot
        run: dart run tool/check_api_snapshot.dart

      - name: Check public API docs
        run: dart run tool/check_public_api_docs.dart

      - name: Check benchmark baseline
        run: dart run benchmark/image_processor_benchmark.dart --check benchmark/baseline.json

      - name: Build API docs
        run: dart doc --output doc/api

      - name: Validate package
        run: dart pub publish --dry-run

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Check example formatting
        working-directory: example
        run: dart format --set-exit-if-changed lib integration_test

      - name: Analyze example
        working-directory: example
        run: flutter analyze

      - name: Create Android example project
        working-directory: example
        run: flutter create --platforms=android --project-name flutter_image_clip_example .

      - name: Build Android example
        working-directory: example
        run: flutter build apk --debug

  ios-example:
    name: iOS example build
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create iOS example project
        working-directory: example
        run: flutter create --platforms=ios --project-name flutter_image_clip_example .

      - name: Build iOS example
        working-directory: example
        run: flutter build ios --debug --no-codesign

  ios-integration:
    name: iOS integration test
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration test on iOS simulator
        run: bash tool/run_ios_integration.sh

  android-integration:
    name: Android integration test (${{ matrix.flutter-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-version:
          - '3.38.1'
          - stable
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up minimum Flutter
        if: matrix.flutter-version != 'stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      - name: Set up stable Flutter
        if: matrix.flutter-version == 'stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration test on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: bash tool/run_android_integration.sh
