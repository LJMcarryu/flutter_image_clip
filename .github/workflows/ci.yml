name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  flutter:
    name: Flutter checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test example

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build API docs
        run: dart doc --output doc/api

      - name: Validate package
        run: dart pub publish --dry-run
